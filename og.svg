<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAEDF8"/>
      <stop offset="60%" stop-color="#EEF0F8"/>
      <stop offset="100%" stop-color="#F3EDE6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="6" height="630" fill="#1B4F8A"/>
  <!-- GMP badge -->
  <rect x="60" y="58" width="64" height="36" rx="8" fill="#1B4F8A"/>
  <text x="92" y="81" font-family="Arial,sans-serif" font-size="13" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">GMP</text>
  <!-- Eyebrow -->
  <text x="140" y="80" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="#2B82DC" letter-spacing="2">EVIDENCE-BASED GUIDE · QUALITY MANAGERS</text>
  <!-- Main title -->
  <text x="60" y="175" font-family="Arial,sans-serif" font-size="58" font-weight="800" fill="#17171A">AI for GMP</text>
  <text x="60" y="245" font-family="Arial,sans-serif" font-size="58" font-weight="800" fill="#17171A">Documentation</text>
  <!-- Subtitle -->
  <text x="60" y="300" font-family="Arial,sans-serif" font-size="24" font-weight="600" fill="#2B82DC">What Works — and What Doesn't</text>
  <!-- Stat boxes -->
  <rect x="60" y="360" width="200" height="90" rx="10" fill="white" opacity="0.85"/>
  <text x="80" y="402" font-family="Arial,sans-serif" font-size="32" font-weight="800" fill="#C03A2B">65–70%</text>
  <text x="80" y="424" font-family="Arial,sans-serif" font-size="11" fill="#90909A">audit observations linked to</text>
  <text x="80" y="439" font-family="Arial,sans-serif" font-size="11" fill="#90909A">documentation failures</text>
  <rect x="278" y="360" width="200" height="90" rx="10" fill="white" opacity="0.85"/>
  <text x="298" y="402" font-family="Arial,sans-serif" font-size="32" font-weight="800" fill="#A06E00">303</text>
  <text x="298" y="424" font-family="Arial,sans-serif" font-size="11" fill="#90909A">FDA drug warning letters</text>
  <text x="298" y="439" font-family="Arial,sans-serif" font-size="11" fill="#90909A">FY2025 (+59% YoY)</text>
  <rect x="496" y="360" width="200" height="90" rx="10" fill="white" opacity="0.85"/>
  <text x="516" y="402" font-family="Arial,sans-serif" font-size="32" font-weight="800" fill="#1B4F8A">2–4 wks</text>
  <text x="516" y="424" font-family="Arial,sans-serif" font-size="11" fill="#90909A">per APQR per product</text>
  <text x="516" y="439" font-family="Arial,sans-serif" font-size="11" fill="#90909A">95% data gathering</text>
  <!-- Bottom -->
  <line x1="60" y1="494" x2="1140" y2="494" stroke="#E0E3EF" stroke-width="1"/>
  <text x="60" y="520" font-family="Arial,sans-serif" font-size="14" fill="#4A4A52" font-weight="600">NathanTwin Intelligence</text>
  <text x="60" y="540" font-family="Arial,sans-serif" font-size="13" fill="#90909A">nathantwin-gmp-intelligence.vercel.app</text>
  <!-- Right side visual accent -->
  <circle cx="1050" cy="320" r="180" fill="#1B4F8A" opacity="0.04"/>
  <circle cx="1050" cy="320" r="120" fill="#1B4F8A" opacity="0.05"/>
  <circle cx="1050" cy="320" r="60" fill="#1B4F8A" opacity="0.07"/>
  <text x="1050" y="310" font-family="Arial,sans-serif" font-size="48" text-anchor="middle" fill="#1B4F8A" opacity="0.3">⚕</text>
  <text x="1050" y="365" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="#1B4F8A" opacity="0.4" font-weight="600">ICH Q10 · 21 CFR 211</text>
  <text x="1050" y="385" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#1B4F8A" opacity="0.35">EMA Annex 22</text>
</svg>
